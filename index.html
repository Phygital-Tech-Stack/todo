<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Nudge</title>
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="description" content="Clawd daily task tracker" />
  <meta name="theme-color" content="#4a90d9" />
  <meta name="apple-mobile-web-app-title" content="Nudge" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #e0e0e0);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--tg-theme-text-color, #e0e0e0);
    }

    .badge {
      background: var(--tg-theme-button-color, #4a90d9);
      color: var(--tg-theme-button-text-color, #fff);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--tg-theme-hint-color, #555);
      background: transparent;
      color: var(--tg-theme-hint-color, #aaa);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--tg-theme-button-color, #4a90d9);
      color: var(--tg-theme-button-text-color, #fff);
      border-color: var(--tg-theme-button-color, #4a90d9);
    }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: opacity 0.2s;
      cursor: pointer;
      border-left: 4px solid transparent;
    }

    .task-card:active { opacity: 0.75; }
    .task-card.done { opacity: 0.45; }

    .task-card.color-deploy  { border-left-color: #4caf50; background: linear-gradient(90deg, rgba(76,175,80,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-upgrade { border-left-color: #ab47bc; background: linear-gradient(90deg, rgba(171,71,188,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-dev     { border-left-color: #4a90d9; background: linear-gradient(90deg, rgba(74,144,217,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-grw     { border-left-color: #ff9800; background: linear-gradient(90deg, rgba(255,152,0,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-phast   { border-left-color: #26c6da; background: linear-gradient(90deg, rgba(38,198,218,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-phaze   { border-left-color: #ef5350; background: linear-gradient(90deg, rgba(239,83,80,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }
    .task-card.color-finance { border-left-color: #ffd93d; background: linear-gradient(90deg, rgba(255,217,61,0.1) 0%, var(--tg-theme-secondary-bg-color,#16213e) 60%); }

    .check-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--tg-theme-button-color, #4a90d9);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 1px;
      position: relative;
      z-index: 2;
    }

    .check-btn.checked {
      background: #4caf50;
      border-color: #4caf50;
    }

    .check-btn svg { display: none; }
    .check-btn.checked svg { display: block; }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .task-card.done .task-title {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-detail {
      font-size: 0.78rem;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 4px;
      line-height: 1.4;
      /* Clamp to 2 lines on list view */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .tag {
      background: rgba(74, 144, 217, 0.15);
      color: var(--tg-theme-button-color, #4a90d9);
      border-radius: 8px;
      padding: 2px 7px;
      font-size: 0.72rem;
    }

    .cat-pill {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 6px;
    }
    .cat-pill.work     { background: rgba(74,144,217,0.12); color: #4a90d9; }
    .cat-pill.personal { background: rgba(76,175,80,0.12);  color: #4caf50; }

    .date-label {
      font-size: 0.72rem;
      color: var(--tg-theme-hint-color, #666);
    }

    .chevron {
      flex-shrink: 0;
      color: var(--tg-theme-hint-color, #555);
      align-self: center;
      font-size: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--tg-theme-hint-color, #888);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    .submit-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: var(--tg-theme-bg-color, #1a1a2e);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .submit-bar.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--tg-theme-button-color, #4a90d9);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 0.9rem;
    }

    .error-msg {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ff6b6b;
      margin-bottom: 16px;
    }

    body.has-submit { padding-bottom: 72px; }

    /* ── Bottom Sheet ─────────────────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 20px 20px 0 0;
      padding: 0 20px 32px;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 82vh;
      overflow-y: auto;
    }

    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--tg-theme-hint-color, #444);
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .sheet-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .sheet-status.pending {
      background: rgba(74, 144, 217, 0.15);
      color: #4a90d9;
    }

    .sheet-status.done {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
    }

    .sheet-status.snoozed {
      background: rgba(255, 193, 7, 0.15);
      color: #ffc107;
    }

    .sheet-title {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .sheet-detail {
      font-size: 0.88rem;
      color: var(--tg-theme-hint-color, #aaa);
      line-height: 1.6;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sheet-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .sheet-meta {
      font-size: 0.78rem;
      color: var(--tg-theme-hint-color, #666);
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sheet-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 20px;
    }

    .sheet-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sheet-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .sheet-btn.primary {
      background: var(--tg-theme-button-color, #4a90d9);
      color: var(--tg-theme-button-text-color, #fff);
    }

    .sheet-btn.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--tg-theme-text-color, #e0e0e0);
    }

    .sheet-btn.danger {
      background: rgba(255, 80, 80, 0.1);
      color: #ff6b6b;
    }

    .comments-section { margin-bottom: 20px; }

    .comments-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tg-theme-hint-color, #666);
      margin-bottom: 10px;
    }

    .comment-item {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 7px;
    }

    .comment-text {
      font-size: 0.85rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .comment-date {
      font-size: 0.7rem;
      color: var(--tg-theme-hint-color, #666);
      margin-top: 4px;
    }

    .comment-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--tg-theme-text-color, #e0e0e0);
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
    }

    .comment-input:focus {
      border-color: var(--tg-theme-button-color, #4a90d9);
    }

    .comment-send-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--tg-theme-button-color, #4a90d9);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 Nudge</h1>
    <span class="badge" id="pending-count">…</span>
  </header>

  <div class="filter-tabs" id="cat-tabs">
    <button class="tab active" data-cat="work" onclick="setCat('work')">💼 Work</button>
    <button class="tab" data-cat="personal" onclick="setCat('personal')">🏠 Personal</button>
    <button class="tab" data-cat="all" onclick="setCat('all')">All</button>
  </div>
  <div class="filter-tabs" id="status-tabs" style="margin-top:-8px;">
    <button class="tab active" data-filter="pending" onclick="setFilter('pending')">Pending</button>
    <button class="tab" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="tab" data-filter="done" onclick="setFilter('done')">Done</button>
  </div>

  <div id="error-container"></div>
  <div id="task-list-container"><div class="loading">Loading tasks…</div></div>

  <div class="submit-bar" id="submit-bar">
    <button class="submit-btn" onclick="submitDone()">✅ Mark selected as done</button>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const TASKS_URL = './tasks.json';
    let allTasks = [];
    let doneIds = new Set();
    let currentFilter = 'pending';
    let currentCat = 'work';
    let activeTaskId = null;

    async function loadTasks() {
      try {
        const res = await fetch(TASKS_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allTasks = data.tasks || [];
        render();
      } catch (e) {
        document.getElementById('error-container').innerHTML =
          `<div class="error-msg">⚠️ Could not load tasks: ${e.message}</div>`;
        document.getElementById('task-list-container').innerHTML = '';
      }
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('#status-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
      render();
    }

    function setCat(c) {
      currentCat = c;
      document.querySelectorAll('#cat-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.cat === c));
      render();
    }

    function render() {
      const catTasks = currentCat === 'all' ? allTasks : allTasks.filter(t => (t.category||'work') === currentCat);
      const pending = catTasks.filter(t => t.status === 'pending');
      document.getElementById('pending-count').textContent = pending.length + ' pending';

      let tasks = allTasks;
      // Category filter
      if (currentCat !== 'all') tasks = tasks.filter(t => (t.category || 'work') === currentCat);
      // Status filter
      if (currentFilter === 'pending') tasks = tasks.filter(t => t.status === 'pending');
      else if (currentFilter === 'done') tasks = tasks.filter(t => t.status === 'done');

      if (tasks.length === 0) {
        document.getElementById('task-list-container').innerHTML = `
          <div class="empty-state">
            <div class="icon">${currentFilter === 'done' ? '🏆' : '✅'}</div>
            <p>${currentFilter === 'pending' ? 'No pending tasks — clean slate!' : 'No tasks here yet.'}</p>
            <p style="font-size:0.8rem;margin-top:6px;opacity:0.6">${currentCat !== 'all' ? 'Switch to All to see other categories.' : ''}</p>
          </div>`;
        return;
      }

      const html = tasks.map(t => {
        const isDone = t.status === 'done' || doneIds.has(t.id);
        const checked = doneIds.has(t.id) && t.status !== 'done';
        const tags = t.tags || [];
        const colorClass = tags.includes('phaze') ? 'color-phaze'
          : tags.includes('phast') ? 'color-phast'
          : tags.includes('grw') ? 'color-grw'
          : tags.includes('finance') ? 'color-finance'
          : tags.some(x => x.includes('upgrade')) ? 'color-upgrade'
          : tags.some(x => x.includes('deploy')) ? 'color-deploy'
          : tags.includes('dev') || tags.includes('github') ? 'color-dev'
          : '';
        return `
          <div class="task-card ${isDone ? 'done' : ''} ${colorClass}" id="card-${t.id}" onclick="openSheet(${t.id})">
            <button class="check-btn ${checked ? 'checked' : ''}"
                    onclick="event.stopPropagation(); toggleDone(${t.id})"
                    ${t.status === 'done' ? 'disabled' : ''}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7L5.5 10.5L12 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="task-body">
              <div class="task-title">${escHtml(t.title)}</div>
              ${t.detail ? `<div class="task-detail">${escHtml(t.detail)}</div>` : ''}
              <div class="task-meta">
                <span class="cat-pill ${(t.category||'work')}">${(t.category||'work') === 'work' ? '💼' : '🏠'} ${escHtml(t.category||'work')}</span>
                ${(t.tags || []).map(tag => `<span class="tag">${escHtml(tag)}</span>`).join('')}
                <span class="date-label">${t.completed ? '✅ ' + t.completed : '📅 ' + t.created}</span>
              </div>
            </div>
            <span class="chevron">›</span>
          </div>`;
      }).join('');

      document.getElementById('task-list-container').innerHTML = `<div class="task-list">${html}</div>`;
    }

    function openSheet(id) {
      const t = allTasks.find(t => t.id === id);
      if (!t) return;
      activeTaskId = id;

      const statusLabel = { pending: '⬜ Pending', done: '✅ Done', snoozed: '💤 Snoozed' }[t.status] || t.status;
      const isPending = t.status === 'pending';
      const isDone = t.status === 'done';

      const links = (t.detail || '').match(/https?:\/\/[^\s,)]+/g) || [];
      const linkHtml = links.length
        ? `<div style="margin-bottom:16px;">${links.map(url => {
            const label = url.replace(/^https?:\/\//, '').replace(/\/$/, '').slice(0, 50);
            return `<a href="${escHtml(url)}" target="_blank"
              style="display:block;color:var(--tg-theme-button-color,#4a90d9);font-size:0.82rem;margin-bottom:6px;word-break:break-all;">
              🔗 ${escHtml(label)}</a>`;
          }).join('')}</div>`
        : '';

      document.getElementById('sheet-content').innerHTML = `
        <span class="sheet-status ${t.status}">${statusLabel}</span>
        <div class="sheet-title">${escHtml(t.title)}</div>
        ${t.detail ? `<div class="sheet-detail">${escHtml(t.detail)}</div>` : ''}
        ${linkHtml}
        ${(t.tags||[]).length ? `<div class="sheet-tags">${t.tags.map(tag => `<span class="tag">${escHtml(tag)}</span>`).join('')}</div>` : ''}
        <div class="sheet-meta">
          <span>📅 Created: ${t.created}</span>
          ${t.completed ? `<span>✅ Completed: ${t.completed}</span>` : ''}
          ${t.snooze_until ? `<span>💤 Snoozed until: ${t.snooze_until}</span>` : ''}
          <span>#${t.id}</span>
        </div>
        <div class="sheet-divider"></div>
        <div class="comments-section">
          <div class="comments-label">💬 Comments</div>
          <div id="comments-list">
            ${(t.comments && t.comments.length)
              ? t.comments.map(c => `
                <div class="comment-item">
                  <div class="comment-text">${escHtml(c.text)}</div>
                  <div class="comment-date">${c.date}</div>
                </div>`).join('')
              : `<div style="font-size:0.82rem;color:var(--tg-theme-hint-color,#666);margin-bottom:8px;">No comments yet.</div>`
            }
          </div>
          <div class="comment-input-row">
            <input class="comment-input" id="comment-input" type="text" placeholder="Add a comment…"
              onkeydown="if(event.key==='Enter')submitComment()" />
            <button class="comment-send-btn" onclick="submitComment()">↑</button>
          </div>
        </div>
        <div class="sheet-divider"></div>
        <div class="sheet-actions">
          ${isPending ? `<button class="sheet-btn primary" onclick="sheetMarkDone()">✅ Mark as Done</button>` : ''}
          ${isDone ? `<button class="sheet-btn secondary" onclick="sheetReopen()">🔄 Reopen</button>` : ''}
          <button class="sheet-btn secondary" onclick="closeSheet()">Close</button>
        </div>
      `;

      document.getElementById('sheet-overlay').classList.add('open');
      document.getElementById('sheet').classList.add('open');

      if (tg?.BackButton) {
        tg.BackButton.show();
        tg.BackButton.onClick(closeSheet);
      }
    }

    function closeSheet() {
      document.getElementById('sheet-overlay').classList.remove('open');
      document.getElementById('sheet').classList.remove('open');
      activeTaskId = null;
      if (tg?.BackButton) tg.BackButton.hide();
    }

    function sheetMarkDone() {
      if (!activeTaskId) return;
      doneIds.add(activeTaskId);
      closeSheet();
      const bar = document.getElementById('submit-bar');
      bar.classList.add('visible');
      document.body.classList.add('has-submit');
      render();
    }

    function submitComment() {
      const input = document.getElementById('comment-input');
      const text = input?.value?.trim();
      if (!text || !activeTaskId) return;
      const payload = JSON.stringify({ action: 'comment', ids: [activeTaskId], text });
      if (tg?.sendData) {
        tg.sendData(payload);
      } else {
        alert('Would send: ' + payload);
      }
      // Optimistic UI — append immediately
      const list = document.getElementById('comments-list');
      const today = new Date().toISOString().slice(0, 10);
      const noComments = list.querySelector('div[style]');
      if (noComments) noComments.remove();
      const el = document.createElement('div');
      el.className = 'comment-item';
      el.innerHTML = `<div class="comment-text">${escHtml(text)}</div><div class="comment-date">${today}</div>`;
      list.appendChild(el);
      input.value = '';
    }

    function sheetReopen() {
      if (!activeTaskId) return;
      const payload = JSON.stringify({ action: 'reopen', ids: [activeTaskId] });
      if (tg?.sendData) tg.sendData(payload);
      closeSheet();
    }

    function toggleDone(id) {
      const task = allTasks.find(t => t.id === id);
      if (!task || task.status === 'done') return;
      if (doneIds.has(id)) { doneIds.delete(id); } else { doneIds.add(id); }
      const bar = document.getElementById('submit-bar');
      if (doneIds.size > 0) {
        bar.classList.add('visible');
        document.body.classList.add('has-submit');
      } else {
        bar.classList.remove('visible');
        document.body.classList.remove('has-submit');
      }
      render();
    }

    function submitDone() {
      if (doneIds.size === 0) return;
      const ids = Array.from(doneIds);
      const payload = JSON.stringify({ action: 'done', ids });
      if (tg?.sendData) { tg.sendData(payload); }
      else { alert('Would send: ' + payload); }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Close sheet on back swipe / escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

    loadTasks();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
